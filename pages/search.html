<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Search</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body class="page-search">
    <input id="theme-toggle" type="checkbox" hidden />

    <div class="app container">
      <div id="header"></div>

      <aside class="sidebar" aria-label="Sidebar">
        <div class="sidebar-head">
          <a class="sidebar-head-link" href="library.html">
            <span class="icon-swap sidebar-icon">
              <img
                class="icon-default"
                src="../assets/icons/Name=Library, Filled=No.svg"
                alt="Library icon"
              />
              <img
                class="icon-filled"
                src="../assets/icons/Name=Library, Filled=Yes.svg"
                alt=""
                aria-hidden="true"
              />
            </span>
            <span class="sidebar-text">My Library</span>
          </a>
        </div>

        <nav class="sidebar-nav" aria-label="My Library Navigation">
          <ul class="sidebar-list">
            <li class="sidebar-item">
              <a class="sidebar-link sidebar-link--has-arrow" href="playlist.html">
                <span class="icon-swap sidebar-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Pin, Filled=No.svg"
                    alt="Pins icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Pin, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="sidebar-text">Pins</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link sidebar-link--has-arrow" href="playlist.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Playlist, Filled=No.svg"
                  alt="Playlists icon"
                />
                <span class="sidebar-text">Playlists</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="song.html">
                <span class="icon-swap sidebar-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Like, Filled=No.svg"
                    alt="Liked songs icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Like, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="sidebar-text">Liked songs</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="album.html">
                <span class="icon-swap sidebar-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Save, Filled=No.svg"
                    alt="Saves icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Save, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="sidebar-text">Saves</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="album.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Album, Filled=No.svg"
                  alt="Albums icon"
                />
                <span class="sidebar-text">Albums</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="library.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Folder, Filled=No.svg"
                  alt="Folders icon"
                />
                <span class="sidebar-text">Folders</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="podcast.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Podcast, Filled=No.svg"
                  alt="Podcasts icon"
                />
                <span class="sidebar-text">Podcasts</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="episode.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Audiobook, Filled=No.svg"
                  alt="Audiobooks icon"
                />
                <span class="sidebar-text">Audiobooks</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="artist.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Artist, Filled=No.svg"
                  alt="Artists icon"
                />
                <span class="sidebar-text">Artists</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <aside class="mobile-sidebar" aria-label="Mobile menu">
        <nav class="mobile-nav" aria-label="Primary Mobile Navigation">
          <ul class="mobile-nav-list">
            <li class="mobile-nav-item">
              <a class="mobile-nav-link" href="../index.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Home, Filled=No.svg"
                    alt="Home icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Home, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Home</span>
              </a>
            </li>
            <li class="mobile-nav-item">
              <a class="mobile-nav-link" href="discover.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Discover, Filled=No.svg"
                    alt="Discover icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Discover, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Discover</span>
              </a>
            </li>
            <li class="mobile-nav-item mobile-nav-item-active">
              <a class="mobile-nav-link" href="search.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Search, Filled=No.svg"
                    alt="Search icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Search, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Search</span>
              </a>
            </li>
            <li class="mobile-nav-item">
              <a class="mobile-nav-link" href="library.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Library, Filled=No.svg"
                    alt="Library icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Library, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Library</span>
              </a>
            </li>
            <li class="mobile-nav-item">
              <a class="mobile-nav-link" href="profile.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=User, Filled=No.svg"
                    alt="Profile icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=User, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Me</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="main search-main" aria-label="Search Content">
        <section class="search-page" aria-label="Search Page">
          <div class="search-mobile-content">
            <header class="search-page__top">
              <div class="search-input" role="search">
                <input
                  id="search-input-mobile"
                  type="text"
                  placeholder="What do you want to play?"
                  aria-label="Search input"
                  data-search-input
                />
                <button type="button" aria-label="Search" data-search-button>
                  <img src="../assets/icons/Name=Search, Filled=No.svg" alt="" />
                </button>
              </div>

              <button class="search-camera" type="button" aria-label="Open camera">
                <img src="../assets/icons/Name=Camera, Filled=No.svg" alt="" />
              </button>
            </header>

            <h1 class="search-page__title">Browse all</h1>
            <p class="search-page__subtitle">Discover</p>

            <div id="search-mobile-grid" class="search-grid" aria-label="Search categories">
            </div>
          </div>

          <div class="search-desktop-content" aria-label="Desktop search browse">
            <section class="search-desktop-section" aria-labelledby="search-recent-title">
              <header class="search-desktop-section__header search-desktop-section__header--compact">
                <h2 id="search-recent-title" class="search-desktop-section__title">Recent searches</h2>
                <button class="search-desktop-section__more" type="button" aria-label="More options">
                  <img src="../assets/icons/Name=More, Filled=No.svg" alt="" />
                </button>
              </header>

              <div id="search-recent-grid" class="search-recent-grid" aria-label="Recent search cards">
              </div>
            </section>

            <section class="search-desktop-section" aria-labelledby="search-browse-title">
              <h2 id="search-browse-title" class="search-desktop-section__title">Browse all</h2>

              <div class="search-carousel-heading">
                <p class="search-carousel-heading__label">Discover</p>
                <div class="search-carousel-heading__actions" aria-hidden="true">
                  <button class="search-carousel-heading__arrow" type="button" tabindex="-1">
                    <img src="../assets/icons/Name=Arrow-Left, Filled=No.svg" alt="" />
                  </button>
                  <button class="search-carousel-heading__arrow" type="button" tabindex="-1">
                    <img src="../assets/icons/Name=Arrow-Right, Filled=No.svg" alt="" />
                  </button>
                </div>
              </div>

              <div id="search-browse-row" class="search-browse-row" aria-label="Browse all categories">
              </div>
            </section>

            <section class="search-desktop-section" aria-labelledby="search-genres-title">
              <div class="search-carousel-heading">
                <h2 id="search-genres-title" class="search-desktop-section__title">Genres</h2>
                <div class="search-carousel-heading__actions" aria-hidden="true">
                  <button class="search-carousel-heading__arrow" type="button" tabindex="-1">
                    <img src="../assets/icons/Name=Arrow-Left, Filled=No.svg" alt="" />
                  </button>
                  <button class="search-carousel-heading__arrow" type="button" tabindex="-1">
                    <img src="../assets/icons/Name=Arrow-Right, Filled=No.svg" alt="" />
                  </button>
                </div>
              </div>

              <div id="search-genre-row" class="search-browse-row" aria-label="Genre categories">
              </div>
            </section>

            <p id="search-empty-state" class="search-empty-state" hidden>No results found.</p>
          </div>
        </section>
      </main>

      <div id="player"></div>
    </div>

    <script src="../js/header-load.js"></script>
    <script src="../js/search-load.js"></script>
    <script src="../js/player-load.js"></script>
  </body>
</html>
