<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Library</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body class="page-library">
    <input id="theme-toggle" type="checkbox" hidden />

    <div class="app container">
      <div id="header"></div>

      <aside class="sidebar" aria-label="Sidebar">
        <div class="sidebar-head">
          <a class="sidebar-head-link" href="library.html">
            <span class="icon-swap sidebar-icon">
              <img
                class="icon-default"
                src="../assets/icons/Name=Library, Filled=No.svg"
                alt="Library icon"
              />
              <img
                class="icon-filled"
                src="../assets/icons/Name=Library, Filled=Yes.svg"
                alt=""
                aria-hidden="true"
              />
            </span>
            <span class="sidebar-text">My Library</span>
          </a>
        </div>

        <nav class="sidebar-nav" aria-label="My Library Navigation">
          <ul class="sidebar-list">
            <li class="sidebar-item">
              <a class="sidebar-link sidebar-link--has-arrow" href="playlist.html">
                <span class="icon-swap sidebar-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Pin, Filled=No.svg"
                    alt="Pins icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Pin, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="sidebar-text">Pins</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link sidebar-link--has-arrow" href="playlist.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Playlist, Filled=No.svg"
                  alt="Playlists icon"
                />
                <span class="sidebar-text">Playlists</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="song.html">
                <span class="icon-swap sidebar-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Like, Filled=No.svg"
                    alt="Liked songs icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Like, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="sidebar-text">Liked songs</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="album.html">
                <span class="icon-swap sidebar-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Save, Filled=No.svg"
                    alt="Saves icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Save, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="sidebar-text">Saves</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="album.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Album, Filled=No.svg"
                  alt="Albums icon"
                />
                <span class="sidebar-text">Albums</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="library.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Folder, Filled=No.svg"
                  alt="Folders icon"
                />
                <span class="sidebar-text">Folders</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="podcast.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Podcast, Filled=No.svg"
                  alt="Podcasts icon"
                />
                <span class="sidebar-text">Podcasts</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="episode.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Audiobook, Filled=No.svg"
                  alt="Audiobooks icon"
                />
                <span class="sidebar-text">Audiobooks</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="artist.html">
                <img
                  class="sidebar-icon"
                  src="../assets/icons/Name=Artist, Filled=No.svg"
                  alt="Artists icon"
                />
                <span class="sidebar-text">Artists</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <aside class="mobile-sidebar" aria-label="Mobile menu">
        <nav class="mobile-nav" aria-label="Primary Mobile Navigation">
          <ul class="mobile-nav-list">
            <li class="mobile-nav-item">
              <a class="mobile-nav-link" href="../index.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Home, Filled=No.svg"
                    alt="Home icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Home, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Home</span>
              </a>
            </li>
            <li class="mobile-nav-item">
              <a class="mobile-nav-link" href="discover.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Discover, Filled=No.svg"
                    alt="Discover icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Discover, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Discover</span>
              </a>
            </li>
            <li class="mobile-nav-item">
              <a class="mobile-nav-link" href="search.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Search, Filled=No.svg"
                    alt="Search icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Search, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Search</span>
              </a>
            </li>
            <li class="mobile-nav-item mobile-nav-item-active">
              <a class="mobile-nav-link" href="library.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=Library, Filled=No.svg"
                    alt="Library icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=Library, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Library</span>
              </a>
            </li>
            <li class="mobile-nav-item">
              <a class="mobile-nav-link" href="profile.html">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="../assets/icons/Name=User, Filled=No.svg"
                    alt="Profile icon"
                  />
                  <img
                    class="icon-filled"
                    src="../assets/icons/Name=User, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Me</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="main library-main" aria-label="Library Content">
        <section class="library-page" aria-label="Library Page">
          <header class="library-toolbar">
            <div class="library-search" role="search">
              <input type="text" placeholder="Search library" aria-label="Search library" />
              <button type="button" aria-label="Search">
                <img src="../assets/icons/Name=Search, Filled=No.svg" alt="" />
              </button>
            </div>

            <button class="library-add" type="button" aria-label="Add">
              <img src="../assets/icons/Name=Add, Filled=No.svg" alt="" />
            </button>
          </header>

          <nav class="library-filter-row" aria-label="Library filters">
            <button class="library-filter-btn library-filter-btn--icon" type="button" aria-label="Group">
              <img src="../assets/icons/Name=Filter, Filled=No.svg" alt="" />
            </button>
            <button class="library-filter-btn" type="button">Group</button>
            <button class="library-filter-btn" type="button">Recents</button>
            <button class="library-filter-btn library-filter-btn--icon" type="button" aria-label="Grid view">
              <img src="../assets/icons/Name=Grid, Filled=No.svg" alt="" />
            </button>
          </nav>

          <ul class="library-list" aria-label="Library categories">
            <li class="library-item">
              <a href="playlist.html" class="library-item__link">
                <h3 class="library-item__title">Playlists</h3>
                <img class="library-item__arrow" src="../assets/icons/Name=Right, Filled=No.svg" alt="" />
              </a>
            </li>
            <li class="library-item">
              <a href="playlist.html" class="library-item__link">
                <h3 class="library-item__title">Playlists by Spotify</h3>
                <img class="library-item__arrow" src="../assets/icons/Name=Right, Filled=No.svg" alt="" />
              </a>
            </li>
            <li class="library-item">
              <a href="album.html" class="library-item__link">
                <h3 class="library-item__title">Albums</h3>
                <img class="library-item__arrow" src="../assets/icons/Name=Right, Filled=No.svg" alt="" />
              </a>
            </li>
            <li class="library-item">
              <a href="library.html" class="library-item__link">
                <h3 class="library-item__title">Folders</h3>
                <img class="library-item__arrow" src="../assets/icons/Name=Right, Filled=No.svg" alt="" />
              </a>
            </li>
            <li class="library-item">
              <a href="artist.html" class="library-item__link">
                <h3 class="library-item__title">Artists</h3>
                <img class="library-item__arrow" src="../assets/icons/Name=Right, Filled=No.svg" alt="" />
              </a>
            </li>
          </ul>
        </section>
      </main>

      <div id="player"></div>
    </div>

    <script src="../js/header-load.js"></script>
    <script src="../js/player-load.js"></script>
  </body>
</html>
