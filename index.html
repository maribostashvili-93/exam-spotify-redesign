<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Redesign project</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/main.css">

</head>
<body>
    <input id="theme-toggle" type="checkbox" hidden />
    <div class="app container">
        <div id="header"></div>

        
    <!-- desktop sidebar -->
      <aside class="sidebar" aria-label="Sidebar">
        <div class="sidebar-head">
          <a class="sidebar-head-link" href="library.html">
            <span class="icon-swap sidebar-icon">
              <img
                class="icon-default"
                src="./assets/icons/Name=Library, Filled=No.svg"
                alt="Library icon"
              />
              <img
                class="icon-filled"
                src="./assets/icons/Name=Library, Filled=Yes.svg"
                alt=""
                aria-hidden="true"
              />
            </span>
            <span class="sidebar-text">My Library</span>
          </a>
        </div>

        <nav class="sidebar-nav" aria-label="My Library Navigation">
          <ul class="sidebar-list">
            <!-- sidebar item 1 -->
            <li class="sidebar-item">
              <a class="sidebar-link sidebar-link--has-arrow" href="#">
                <span class="icon-swap sidebar-icon">
                  <img
                    class="icon-default"
                    src="./assets/icons/Name=Pin, Filled=No.svg"
                    alt="Pins icon"
                  />

                    class="icon-filled"
                    src="./assets/icons/Name=Pin, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />

            <!-- sidebar item 2 -->
            <li class="sidebar-item">
              <a class="sidebar-link sidebar-link--has-arrow" href="#">

                    class="icon-filled"
                    src="./assets/icons/Name=Like, Filled=Yes.svg"
                    alt=""

                <span class="sidebar-text">Liked songs</span>

            <!-- sidebar item 4 -->

                    class="icon-filled"
                    src="./assets/icons/Name=Save, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="sidebar-text">Saves</span>

            <!-- sidebar item 5 -->
            <li class="sidebar-item">
              <a class="sidebar-link" href="#">

                  class="sidebar-icon"

            <!-- sidebar item 6 -->
            <li class="sidebar-item">
              <a class="sidebar-link" href="#">
                <img

                  src="./assets/icons/Name=Podcast, Filled=No.svg"

                    aria-hidden="true"

                </span>
                <span class="mobile-nav-text">Search</span>
              </a>
            </li>
            <!-- mobile nav item 4 -->
            <li class="mobile-nav-item">
              <a class="mobile-nav-link" href="#">
                <span class="icon-swap mobile-nav-icon">
                  <img
                    class="icon-default"
                    src="./assets/icons/Name=Library, Filled=No.svg"
                    alt="Library icon"
                  />
                  <img
                    class="icon-filled"
                    src="./assets/icons/Name=Library, Filled=Yes.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </span>
                <span class="mobile-nav-text">Library</span>
